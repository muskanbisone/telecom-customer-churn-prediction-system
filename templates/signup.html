<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up — ChurnGuard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      :root {
        --bg: #05050f; --bg2: #0a0a1a; --card: #0f0f22;
        --border: rgba(124,58,237,0.2); --border-hover: rgba(124,58,237,0.7);
        --purple: #7c3aed; --purple-light: #a78bfa; --purple-pale: #c4b5fd;
        --pink: #f472b6; --green: #22c55e;
        --text: #ffffff; --text-muted: #94a3b8;
        --font: "Plus Jakarta Sans", sans-serif;
      }
      body { background-color: var(--bg); color: var(--text); font-family: var(--font); overflow-x: hidden; }
      body::before {
        content: ""; position: fixed; inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
        pointer-events: none; z-index: 9999; opacity: 0.4;
      }

      .navbar {
        position: fixed; top: 0; width: 100%; z-index: 100;
        padding: 18px 48px; display: flex; align-items: center;
        justify-content: space-between;
        background: rgba(5,5,15,0.8); backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--border);
      }
      .navbar-left { display: flex; align-items: center; gap: 10px; }
      .logo-dot {
        width: 32px; height: 32px;
        background: linear-gradient(135deg, var(--purple), var(--pink));
        border-radius: 8px; display: flex; align-items: center;
        justify-content: center; font-size: 16px;
      }
      .brand-name {
        font-size: 20px; font-weight: 900; letter-spacing: -0.5px;
        background: linear-gradient(135deg, #fff, var(--purple-pale));
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      }
      .navbar-right { display: flex; align-items: center; gap: 8px; }
      .nav-link {
        color: var(--text-muted); text-decoration: none; font-size: 14px;
        font-weight: 600; padding: 8px 16px; border-radius: 8px; transition: all 0.2s;
      }
      .nav-link:hover { color: white; background: rgba(124,58,237,0.15); }

      .page {
        min-height: 100vh; display: flex; align-items: center;
        justify-content: center; padding: 100px 24px 40px;
        position: relative; overflow: hidden;
      }
      .page::before {
        content: ""; position: absolute; top: 20%; left: 50%;
        transform: translateX(-50%); width: 600px; height: 600px;
        background: radial-gradient(circle, rgba(124,58,237,0.2) 0%, transparent 65%);
        pointer-events: none;
      }

      .auth-card {
        background: linear-gradient(135deg, #0f0f22, #13132b);
        border: 1px solid var(--border);
        border-radius: 24px; padding: 48px 40px;
        width: 100%; max-width: 440px;
        position: relative; z-index: 1;
        box-shadow: 0 40px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(124,58,237,0.1);
        animation: fadeUp 0.6s ease both;
      }

      .auth-badge {
        display: inline-flex; align-items: center; gap: 8px;
        background: rgba(34,197,94,0.1);
        border: 1px solid rgba(34,197,94,0.3);
        border-radius: 30px; padding: 5px 14px;
        font-size: 12px; font-weight: 600; color: #86efac;
        margin-bottom: 24px;
      }

      .auth-card h1 {
        font-size: 28px; font-weight: 900; letter-spacing: -0.5px;
        margin-bottom: 8px; color: white;
      }

      .auth-card .subtitle {
        font-size: 14px; color: var(--text-muted);
        margin-bottom: 32px; line-height: 1.6;
      }

      .alert {
        background: rgba(34,197,94,0.1);
        border: 1px solid rgba(34,197,94,0.3);
        border-radius: 10px; padding: 12px 16px;
        font-size: 13px; color: #86efac;
        margin-bottom: 24px;
      }

      .form-group { margin-bottom: 20px; }
      .form-group label {
        display: block; font-size: 13px; font-weight: 700;
        color: var(--purple-pale); margin-bottom: 8px; letter-spacing: 0.3px;
      }
      .form-group input {
        width: 100%; padding: 13px 16px;
        background: rgba(5,5,15,0.8);
        border: 1px solid var(--border);
        border-radius: 10px; font-size: 14px;
        color: white; outline: none;
        font-family: var(--font); transition: all 0.2s;
      }
      .form-group input::placeholder { color: var(--text-muted); }
      .form-group input:focus {
        border-color: var(--purple);
        box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
      }

      .btn-primary {
        width: 100%; padding: 14px;
        background: linear-gradient(135deg, var(--green), #16a34a);
        color: #000; border: none; border-radius: 10px;
        font-size: 15px; font-weight: 800; cursor: pointer;
        font-family: var(--font); transition: all 0.2s;
        margin-top: 4px;
      }
      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(34,197,94,0.3);
      }

      .divider {
        display: flex; align-items: center; gap: 12px;
        margin: 24px 0; color: var(--text-muted); font-size: 12px;
      }
      .divider::before, .divider::after {
        content: ""; flex: 1; height: 1px; background: var(--border);
      }

      .social-row { display: flex; gap: 12px; }
      .social-btn {
        flex: 1; padding: 11px;
        background: rgba(255,255,255,0.04);
        border: 1px solid var(--border);
        border-radius: 10px; font-size: 18px;
        cursor: pointer; transition: all 0.2s;
        display: flex; align-items: center; justify-content: center;
      }
      .social-btn:hover {
        background: rgba(124,58,237,0.1);
        border-color: var(--border-hover);
      }

      .auth-footer {
        margin-top: 24px; text-align: center;
        font-size: 13px; color: var(--text-muted);
      }
      .auth-footer a {
        color: var(--purple-pale); text-decoration: none; font-weight: 700;
      }
      .auth-footer a:hover { color: white; }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="navbar-left">
        <div class="logo-dot">📊</div>
        <span class="brand-name">ChurnGuard</span>
      </div>
      <div class="navbar-right">
        <a href="/" class="nav-link">Home</a>
        <a href="/login" class="nav-link">Login</a>
      </div>
    </nav>

    <div class="page">
      <div class="auth-card">

        <div class="auth-badge">✨ Create Account</div>
        <h1>Get started free</h1>
        <p class="subtitle">Create your account and start predicting customer churn in minutes.</p>

        <form action="/signup" method="POST">
          <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" placeholder="Choose a username" required />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Create a password" required />
          </div>
          <button type="submit" class="btn-primary">Create Account →</button>
        </form>

        <div class="divider">or continue with</div>
        <div class="social-row">
          <div class="social-btn">🌐</div>
          <div class="social-btn">📧</div>
          <div class="social-btn">📱</div>
        </div>

        <p class="auth-footer">
          Already have an account? <a href="/login">Login →</a>
        </p>

      </div>
    </div>
  </body>
</html>
